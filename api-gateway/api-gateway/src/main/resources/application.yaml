server:
  port: 8080

spring:
  application:
    name: API-GATEWAY
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-route
              uri: lb://USER-SERVICE
#              uri: http://localhost:8081
              predicates:
                - Path=/users/**

              filters: #Circuit breaker configuration
                - name: CircuitBreaker
                  args:
                    name: userCircuitBreaker
                    fallbackUri: forward:/fallback

            - id: order-route
              uri: lb://ORDER-SERVICE
#              uri: http://localhost:8082
              predicates:
                - Path=/orders/**

              filters: #Circuit breaker configuration
                - name: CircuitBreaker
                  args:
                    name: orderCircuitBreaker
                    fallbackUri: forward:/fallback

# Add redis server
#  data:
#    redis:
#      host: localhost
#      port: 6786

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

